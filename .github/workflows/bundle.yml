name: Desktop bundles

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: weather-desktop-master-bundle
  cancel-in-progress: false

jobs:
  linux:
    name: Bundle Linux x86_64
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    uses: ./.github/workflows/bundle-linux.yml
    with:
      tested_commit: ${{ github.event.workflow_run.head_sha }}
      source_run: ${{ github.event.workflow_run.id }}

  windows:
    name: Bundle Windows 10 x86_64
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    uses: ./.github/workflows/bundle-windows.yml
    with:
      tested_commit: ${{ github.event.workflow_run.head_sha }}
      source_run: ${{ github.event.workflow_run.id }}

  macos:
    name: Bundle macOS
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    uses: ./.github/workflows/bundle-macos.yml
    with:
      tested_commit: ${{ github.event.workflow_run.head_sha }}
      source_run: ${{ github.event.workflow_run.id }}

  finalize:
    name: Retain only the latest bundle per target
    if: >-
      always() &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    needs: [linux, windows, macos]
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Remove superseded target artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const latestNames = new Set([
              'weather-linux-x86_64-latest',
              'weather-windows-x86_64-nsis-latest',
              'weather-windows-x86_64-tar-latest',
              'weather-macos-universal-latest',
              'weather-macos-aarch64-latest',
            ]);
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const currentArtifacts = new Map(
              artifacts
                .filter((artifact) =>
                  latestNames.has(artifact.name) &&
                  artifact.workflow_run?.id === context.runId
                )
                .map((artifact) => [artifact.name, artifact.id])
            );
            for (const artifact of artifacts) {
              const keepId = currentArtifacts.get(artifact.name);
              const isSupersededTarget = keepId && artifact.id !== keepId;
              if (isSupersededTarget) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }
