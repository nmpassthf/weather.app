name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-linux:
    name: Native Linux
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check workspace
        run: cargo check --workspace --all-targets --all-features
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  musl:
    name: Linux musl
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Install stable Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Check musl target
        run: cargo check --workspace --target x86_64-unknown-linux-musl

  windows-gnu:
    name: Windows GNU cross
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install MinGW
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-mingw-w64-x86-64
      - name: Install stable Rust with Windows GNU target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Check Windows GNU target
        run: cargo check --workspace --target x86_64-pc-windows-gnu

  windows-native:
    name: Native Windows
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check workspace
        run: cargo check --workspace --all-targets --all-features
