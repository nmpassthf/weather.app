name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-linux:
    name: Ubuntu 22.04 (minimum supported)
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Verify minimum Linux ABI
        run: |
          test "$(getconf GNU_LIBC_VERSION)" = "glibc 2.35"
          pkg-config --atleast-version=2.70 glib-2.0
          pkg-config --exists gtk+-3.0 webkit2gtk-4.1
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check application feature matrix
        run: |
          cargo check -p weather-app
          cargo check -p weather-app --features tui
          cargo check -p weather-app --features gui
          cargo check -p weather-app --features desktop
      - name: Check workspace
        run: cargo check --workspace --all-targets --all-features
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --workspace --all-features
      - name: Install Bun
        run: npm install --global bun@1.3.14
      - name: Check frontend
        working-directory: weather-renderer/gui
        run: |
          bun install --frozen-lockfile
          bun test
          bun run build

  musl:
    name: Linux musl (daemon + TUI)
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Install stable Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Check musl target
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: >-
          cargo check -p weather-app --no-default-features --features daemon,tui
          --target x86_64-unknown-linux-musl

  windows-gnu:
    name: Windows GNU cross (daemon + TUI)
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Install MinGW
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-mingw-w64-x86-64
      - name: Install stable Rust with Windows GNU target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Check Windows GNU target
        run: >-
          cargo check -p weather-app --no-default-features --features daemon,tui
          --target x86_64-pc-windows-gnu

  windows-native:
    name: Native Windows
    runs-on: windows-2022
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check workspace
        run: cargo check -p weather-app --all-targets --features desktop

  macos-native:
    name: Native macOS
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Check desktop application
        run: cargo check -p weather-app --all-targets --features desktop
